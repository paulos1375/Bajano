<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/nl">
  <script>
    var lang = (navigator.language || navigator.userLanguage || 'nl').toLowerCase();
    if (lang.startsWith('nl')) window.location.replace('/nl');
    else if (lang.startsWith('es')) window.location.replace('/es');
    else window.location.replace('/en');
  </script>
</head>
<body></body>
</html>

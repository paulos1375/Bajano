<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0;url=/Bajano/nl">
  <script>
    var lang = (navigator.language || navigator.userLanguage || 'nl').toLowerCase();
    if (lang.startsWith('nl')) window.location.replace('/Bajano/nl');
    else if (lang.startsWith('es')) window.location.replace('/Bajano/es');
    else window.location.replace('/Bajano/en');
  </script>
</head>
<body></body>
</html>
